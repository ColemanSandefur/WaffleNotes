name: "Netlify Preview"

on:
  push:
    branches-ignore:
      - main

jobs:
  deploy:
    name: "Deploy"
    runs-on: ubuntu-latest
    permissions:
      statuses: write # Required for Sibz/github-status-action
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          # Ensures the checkout action pulls the PR branch instead of the merge commit
          ref: ${{ github.event.pull_request.head.sha }}

      # Sets the branch name as environment variable
      - uses: nelonoel/branch-name@v1.0.1

      - name: Deploy to Netlify
        uses: jsmrcaga/action-netlify-deploy@v2.4.0
        with:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          deploy_alias: ${{ env.BRANCH_NAME }}
          build_directory: "dist"
          functions_directory: "netlify/functions"

      - name: Status check
        uses: Sibz/github-status-action@v1.1.1
        with:
          authToken: ${{ secrets.GITHUB_TOKEN }}
          context: Netlify preview
          state: success
          target_url: ${{ env.NETLIFY_PREVIEW_URL }}
